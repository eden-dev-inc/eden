name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libssl-dev \
            mold \
            pkg-config \
            protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91
        with:
          components: clippy,rustfmt

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check locked workspace metadata
        run: cargo metadata --locked --no-deps --format-version 1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace --all-features --locked

      - name: Run clippy
        run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings

      - name: Run unit tests
        run: cargo test --workspace --all-features --locked --lib --bins
