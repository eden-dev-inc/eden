[package]
name = "clickhouse-wire"
description = "ClickHouse Wire Protocol streaming parser"
version = "0.1.0"
edition = "2024"

[features]
default = ["lz4"]
lz4 = ["dep:lz4_flex"]

[dependencies]
wire-stream = { workspace = true }
thiserror = { workspace = true }
memchr = { workspace = true }
lz4_flex = { version = "0.11", optional = true }
cityhash-rs = "1.0"

[dev-dependencies]
pollster = { workspace = true }

[lints]
workspace = true
