[package]
name = "mongo-wire"
description = "MongoDB Wire Protocol streaming parser"
version = "0.1.0"
edition = "2024"

[features]
default = ["decompression"]
decompression = []
snappy = ["dep:snap"]

[dependencies]
wire-stream = { workspace = true }
thiserror = { workspace = true }
byteorder = { workspace = true }
bson = { workspace = true }
flate2 = "1.1.5"
zstd = "0.13.3"
snap = { version = "1.1.1", optional = true }
crc32c = "0.6.8"

[dev-dependencies]
pollster = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "mongo_parsing"
harness = false

[lints]
workspace = true