[package]
name = "gateway-postgres"
version = "0.1.0"
edition = "2024"

[dependencies]
eden-gateway-core = { path = "../core" }
ep-runtime = { path = "../../ep-runtime", default-features = false, features = ["postgres"] }
eden-core = { path = "../../eden_core" }
eden_logger_internal = { workspace = true }
eden_logger = { workspace = true }
ep-core = { path = "../../endpoint-core/ep-core", default-features = false }
postgres-core = { path = "../../endpoint-core/postgres-core" }
endpoints = { path = "../../endpoints", default-features = false, features = ["postgres"] }

postgres-wire = { path = "../../wire-protocol/postgres-wire" }
eden_config = { path = "../../eden_config" }

database = { path = "../../database", default-features = false }

ahash = { workspace = true }
base64 = { workspace = true }
bb8 = { workspace = true }
bb8-redis = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
cfg-if = { workspace = true }
dashmap = { workspace = true }
once_cell = { workspace = true }
opentelemetry = { workspace = true }
rand = { workspace = true }
redis = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-postgres = { workspace = true }
xxhash-rust = { workspace = true }

[features]
default = []
embedded-db = ["database/embedded-db"]

[lints]
workspace = true
