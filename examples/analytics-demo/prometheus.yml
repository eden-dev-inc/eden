global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'analytics-server'
    static_configs:
      - targets: ['analytics-server:3000']
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 5s

  - job_name: 'traffic-client'
    static_configs:
      - targets: ['traffic-client:3100']
    metrics_path: /metrics
    scrape_interval: 5s
    scrape_timeout: 5s
