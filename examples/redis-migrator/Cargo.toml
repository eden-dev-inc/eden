[package]
name = "redis-migrator"
version = "0.1.0"
edition = "2021"
description = "Migrate Redis data with Eden setup, population, workload generation, and observation tools"

[dependencies]
redis = { version = "0.32", features = ["tokio-comp", "connection-manager", "aio"] }
tokio = { version = "1.0", features = ["full"] }
clap = { version = "4.5", features = ["derive", "env"] }
rand = "0.8"
indicatif = "0.17"
uuid = { version = "1.0", features = ["v4"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
dotenvy = "0.15"
url = "2.5"
reqwest = { version = "0.12", features = ["json"] }
percent-encoding = "2.3"
urlencoding = "2.1.3"
crossterm = "0.29"
ratatui = "0.29"
fern = "0.6"
chrono = "0.4"
log = "0.4"

[features]
default = []
