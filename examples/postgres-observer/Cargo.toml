[package]
name = "postgres-observer"
version = "0.1.0"
edition = "2024"

[dependencies]
postgres = "0.19"
postgres-native-tls = "0.5"
native-tls = "0.2"
crossterm = "0.29"
ratatui = "0.29"
tokio = { version = "1.0", features = ["rt-multi-thread", "macros", "sync"] }
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
fern = "0.6"
chrono = "0.4"
log = "0.4"
