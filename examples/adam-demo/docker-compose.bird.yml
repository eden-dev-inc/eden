name: adam-demo-bird

## BIRD benchmark vertical
##
## Imports one BIRD SQLite database into Postgres, validates a replayable
## subset of benchmark SQL, then drives those queries through Eden.
##
## Place the BIRD files under:
##   init/data/bird/dev.json
##   init/data/bird/dev_databases/<db_id>/<db_id>.sqlite
##
## Or copy the upstream repo layout under init/data/bird/data/.

networks:
  adam-network:
    driver: bridge

volumes:
  pg_bird_data:

services:
  pg-bird:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eden
      POSTGRES_PASSWORD: eden
      POSTGRES_DB: bird
    ports:
      - "5634:5432"
    volumes:
      - pg_bird_data:/var/lib/postgresql/data
      - ./init/schemas/rbac_postgres.sql:/docker-entrypoint-initdb.d/01-rbac.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eden -d bird"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - adam-network

  data-init:
    build:
      context: ./init
      dockerfile: Dockerfile
    depends_on:
      pg-bird:
        condition: service_healthy
    environment:
      VERTICAL: bird
      PG_BIRD_URL: postgresql://eden:eden@pg-bird:5432/bird
      BIRD_DATASET_DIR: /app/data/bird
      BIRD_DATASET_URL: ${BIRD_DATASET_URL:-https://bird-bench.oss-cn-beijing.aliyuncs.com/dev.zip}
      BIRD_QUERY_MANIFEST: /app/data/bird/validated_queries.json
      BIRD_SPLIT: ${BIRD_SPLIT:-dev}
      BIRD_DB_ID: ${BIRD_DB_ID:-california_schools}
      BIRD_MAX_QUERIES: ${BIRD_MAX_QUERIES:-150}
      BIRD_QUERY_TIMEOUT_MS: ${BIRD_QUERY_TIMEOUT_MS:-1500}
      BIRD_FORCE_RELOAD: ${BIRD_FORCE_RELOAD:-0}
    volumes:
      - ./init/data:/app/data
    networks:
      - adam-network

  adam-app:
    profiles: [app]
    build:
      context: ./app
      dockerfile: Dockerfile
    depends_on:
      data-init:
        condition: service_completed_successfully
    environment:
      VERTICAL: bird
      EDEN_API_URL: ${EDEN_API_URL:-http://host.docker.internal:8000}
      EDEN_ORG_ID: ${EDEN_ORG_ID:-adam-demo}
      EDEN_JWT_TOKEN: ${EDEN_JWT_TOKEN:-}
      EDEN_NEW_ORG_SECRET: ${EDEN_NEW_ORG_SECRET:-neworgsecret}
      BIND_ADDRESS: 0.0.0.0:3000
      QUERIES_PER_SECOND: ${QUERIES_PER_SECOND:-50}
      MAX_WORKERS: ${MAX_WORKERS:-20}
      PG_BIRD_URL: postgresql://eden:eden@pg-bird:5432/bird
      EDEN_PG_BIRD_URL: postgresql://eden:eden@host.docker.internal:5634/bird
      BIRD_QUERY_MANIFEST: /app/data/bird/validated_queries.json
      BIRD_DATASET_URL: ${BIRD_DATASET_URL:-https://bird-bench.oss-cn-beijing.aliyuncs.com/dev.zip}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      AZURE_APP_ID: ${AZURE_APP_ID:-}
      AZURE_DISPLAY_NAME: ${AZURE_DISPLAY_NAME:-}
      AZURE_PASSWORD: ${AZURE_PASSWORD:-}
      AZURE_TENANT: ${AZURE_TENANT:-}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-}
      AZURE_API_BASE_URL: ${AZURE_API_BASE_URL:-https://management.azure.com}
      GITLAB_ACCESS_TOKEN: ${GITLAB_ACCESS_TOKEN:-}
      GITLAB_API_BASE_URL: ${GITLAB_API_BASE_URL:-https://gitlab.com/api/v4}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-nano}
      ERASER_API_KEY: ${ERASER_API_KEY:-}
      BIRD_DB_ID: ${BIRD_DB_ID:-california_schools}
      BIRD_SPLIT: ${BIRD_SPLIT:-dev}
    ports:
      - "3000:3000"
    volumes:
      - ./init/data:/app/data:ro
    networks:
      - adam-network
