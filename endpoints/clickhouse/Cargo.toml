[package]
name = "ep-clickhouse"
version = "0.1.0"
edition = "2024"

[dependencies]
eden_logger_internal = { workspace = true }
eden_logger = { workspace = true }
ep-core = { path = "../../endpoint-core/ep-core", default-features = false }
clickhouse-core = { path = "../../endpoint-core/clickhouse-core", default-features = false }
endpoint-derive = { path = "../endpoint-derive" }
endpoint-types = { path = "../endpoint-types" }
error = { path = "../../eden_core/error", default-features = false }
format = { path = "../../eden_core/format" }
telemetry = { path = "../../eden_core/telemetry" }
clickhouse-wire = { path = "../../wire-protocol/clickhouse-wire" }
wire-stream = { path = "../../wire-protocol/wire-stream" }

borsh = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
# Use aliased dependency name from workspace to avoid doctest E0464:
# package name `clickhouse` collides with external crate `clickhouse`.
clickhouse_client = { workspace = true }
ctor = { workspace = true }
dashmap = { workspace = true }
deadpool = { workspace = true }
derive_builder = { workspace = true }
function_name = { workspace = true }
futures = { workspace = true }
log = { workspace = true }
futures-util = { workspace = true }
linkme = { workspace = true }
opentelemetry = { workspace = true }
paste = { workspace = true }
reqwest = { workspace = true }
rmcp = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
utoipa = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
httpmock = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
