[package]
name = "ep-mongo"
version = "0.1.0"
edition = "2024"

[dependencies]
eden_config = { path = "../../eden_config" }
eden_logger_internal = { workspace = true }
eden_logger = { workspace = true }
ep-core = { path = "../../endpoint-core/ep-core", default-features = false }
mongo-core = { path = "../../endpoint-core/mongo-core", default-features = false }
endpoint-derive = { path = "../endpoint-derive" }
endpoint-types = { path = "../endpoint-types" }
error = { path = "../../eden_core/error", default-features = false }
format = { path = "../../eden_core/format" }
telemetry = { path = "../../eden_core/telemetry" }

borsh = { workspace = true }
bytes = { workspace = true }
byteorder = { workspace = true }
chrono = { workspace = true }
ctor = { workspace = true }
dashmap = { workspace = true }
derive_builder = { workspace = true }
function_name = { workspace = true }
futures-util = { workspace = true }
lazy_static = { workspace = true }
linkme = { workspace = true }
mongodb = { workspace = true }
once_cell = { workspace = true }
opentelemetry = { workspace = true }
paste = { workspace = true }
reqwest = { workspace = true }
rmcp = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
utoipa = { workspace = true }

[dev-dependencies]
endpoint-test-utils = { path = "../endpoint-test-utils" }
httpmock = { workspace = true }
serial_test = { workspace = true }
testcontainers-modules = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

[features]
integration = []
embedded-db = ["ep-core/embedded-db", "endpoint-types/embedded-db", "endpoint-test-utils/embedded-db"]
