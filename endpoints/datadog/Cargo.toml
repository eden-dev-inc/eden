[package]
name = "ep-datadog"
version = "0.1.0"
edition = "2024"

[dependencies]
eden_logger_internal = { workspace = true }
eden_logger = { workspace = true }
ep-core = { path = "../../endpoint-core/ep-core", default-features = false }
datadog-core = { path = "../../endpoint-core/datadog-core", default-features = false, features = ["sdk"] }
endpoint-types = { path = "../endpoint-types" }
error = { path = "../../eden_core/error", default-features = false }
format = { path = "../../eden_core/format" }
telemetry = { path = "../../eden_core/telemetry" }

datadog-api-client = { version = "=0.30.0", default-features = false, features = ["rustls-tls"] }

borsh = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
ctor = { workspace = true }
dashmap = { workspace = true }
deadpool = { workspace = true }
derive_builder = { workspace = true }
function_name = { workspace = true }
futures = { workspace = true }
lazy_static = { workspace = true }
linkme = { workspace = true }
log = { workspace = true }
opentelemetry = { workspace = true }
paste = { workspace = true }
reqwest = { workspace = true }
rmcp = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
urlencoding = { workspace = true }
utoipa = { workspace = true }

[dev-dependencies]
endpoint-test-utils = { path = "../endpoint-test-utils" }
httpmock = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
wiremock = { workspace = true }
