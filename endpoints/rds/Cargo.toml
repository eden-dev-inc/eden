[package]
name = "ep-rds"
version = "0.1.0"
edition = "2024"

[dependencies]
postgres = { package = "ep-postgres", path = "../postgres" }
endpoint-types = { path = "../endpoint-types" }
eden_logger_internal = { workspace = true }
eden_logger = { workspace = true }
ep-core = { path = "../../endpoint-core/ep-core", default-features = false }
postgres-core = { path = "../../endpoint-core/postgres-core", default-features = false }
error = { path = "../../eden_core/error", default-features = false }
format = { path = "../../eden_core/format" }
telemetry = { path = "../../eden_core/telemetry" }

aws-config = { workspace = true }
aws-sdk-rds = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
dashmap = { workspace = true }
borsh = { workspace = true }
ctor = { workspace = true }
linkme = { workspace = true }
serde = { workspace = true }
function_name = { workspace = true }
opentelemetry = { workspace = true }
reqwest = { workspace = true }
rmcp = { workspace = true }
schemars = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
utoipa = { workspace = true }

[dev-dependencies]
endpoint-test-utils = { path = "../endpoint-test-utils" }
httpmock = { workspace = true }
testcontainers-modules = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }

[features]
# Optional integration tests that talk to real AWS RDS control-plane APIs.
# These tests are ignored by default and must be explicitly enabled.
rds-aws-integration = []
